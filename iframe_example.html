<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NAVER</title>
  <style>
    body {
      margin: 0;
      padding: 0;
      overflow: hidden;
    }
    iframe {
      width: 100%;
      height: 100vh;
      border: none;
    }
  </style>
</head>
<body>
  <!-- 주의: 이 방법은 많은 제한이 있고 권장되지 않습니다 -->
  <iframe src="index.html" title="NAVER"></iframe>
  
  <script>
    // iframe 내부에서 URL 변경 시도 (제한적)
    window.addEventListener('message', function(event) {
      if (event.data.type === 'updateURL') {
        // 이 부분은 실제로 작동하지 않습니다
        console.log('URL 업데이트 시도:', event.data.url);
      }
    });
  </script>
</body>
</html>
