<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NAVER</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500&family=Roboto:wght@300;400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/static/style.css">
  <link rel="icon" href="/static/images/logo.jpeg">
</head>
<body>
  <div class="top-section">
    <img src="/static/images/naver_main_up.png" alt="NAVER Top" class="top-image">
  </div>
  
  <main>
    <div class="search-container">
      <form id="chat-form" class="search-form" action="/search" method="GET">
        <div class="search-box">
          <div class="search-icon">
            <img src="/static/images/white_logo.png" alt="NAVER" class="search-logo">
          </div>
          <input type="text" id="user-input" name="q" placeholder="검색어를 입력해주세요" autocomplete="off" />
          <div class="mic-icon">
            <svg focusable="false" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
              <path fill="#03c75a" d="M15.5 14h-.79l-.28-.27A6.471 6.471 0 0 0 16 9.5 6.5 6.5 0 1 0 9.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z"></path>
            </svg>
          </div>
        </div>
      </form>
      
      <div id="response" class="response-container"></div>
    </div>
  </main>

  <div class="main-image-section">
    <img src="/static/images/naver_main.png" alt="NAVER Main" class="main-image">
  </div>

  <footer>
    <div class="footer-content">
      <div class="footer-left">
        <a href="#" class="footer-link">이용약관</a>
        <a href="#" class="footer-link">개인정보처리방침</a>
        <a href="#" class="footer-link">책임의 한계와 법적고지</a>
        <a href="#" class="footer-link">회원정보 고객센터</a>
      </div>
      <div class="footer-right">
        <a href="#" class="footer-link">ⓒ NAVER Corp.</a>
      </div>
    </div>
  </footer>

  <script>
    // 검색 폼 제출 이벤트
    document.getElementById("chat-form").addEventListener("submit", function(e) {
      e.preventDefault();
      const query = document.getElementById("user-input").value;
      if (query.trim()) {
        window.location.href = `/search?q=${encodeURIComponent(query)}`;
      }
    });
  </script>
</body>
</html>
